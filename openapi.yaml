openapi: "3.0.3"
info:
  title: Marketplace API
  version: "1.0.0"
  description: API для маркетплейса

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                $ref: "#/components/schemas/ErrorDetail"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        login:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [Buyer, Seller]
        createdAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [login, email, password]
      properties:
        login:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        user:
          $ref: "#/components/schemas/User"

    Address:
      type: object
      properties:
        id:
          type: string
          format: uuid
        country:
          type: string
        city:
          type: string
        street:
          type: string
        postalCode:
          type: string

    CreateAddressRequest:
      type: object
      required: [country, city, street, postalCode]
      properties:
        country:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        street:
          type: string
          maxLength: 200
        postalCode:
          type: string
          maxLength: 20

    UpdateAddressRequest:
      type: object
      properties:
        country:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        street:
          type: string
          maxLength: 200
        postalCode:
          type: string
          maxLength: 20

    ProductDeliveryType:
      type: string
      enum: [Physical, Digital]

    ProductStatus:
      type: string
      enum: [Active, Archived]

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sellerId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        currency:
          type: string
        deliveryType:
          $ref: "#/components/schemas/ProductDeliveryType"
        status:
          $ref: "#/components/schemas/ProductStatus"
        createdAt:
          type: string
          format: date-time

    CreateProductRequest:
      type: object
      required: [name, price, currency, deliveryType]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        price:
          type: number
          minimum: 0.01
        currency:
          type: string
          minLength: 3
          maxLength: 3
        deliveryType:
          $ref: "#/components/schemas/ProductDeliveryType"
        categoryIds:
          type: array
          items:
            type: string
            format: uuid
        stock:
          type: integer
          minimum: 0

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        price:
          type: number
          minimum: 0.01
        currency:
          type: string
          minLength: 3
          maxLength: 3
        categoryIds:
          type: array
          items:
            type: string
            format: uuid

    UpdateStockRequest:
      type: object
      required: [stock]
      properties:
        stock:
          type: integer
          minimum: 0

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    CartItem:
      type: object
      properties:
        itemId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
        unitPrice:
          type: number
          format: double

    CartResponse:
      type: object
      properties:
        cartId:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        total:
          type: number
          format: double
        currency:
          type: string

    AddCartItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    UpdateCartItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1

    OrderStatus:
      type: string
      enum: [Draft, Placed, Paid, Fulfilled, Completed, Cancelled]

    FulfillmentStatus:
      type: string
      enum: [Pending, Delivered]

    OrderItem:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        sellerId:
          type: string
          format: uuid
        quantity:
          type: integer
        unitPrice:
          type: number
          format: double
        fulfillmentStatus:
          $ref: "#/components/schemas/FulfillmentStatus"

    OrderResponse:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/OrderStatus"
        amount:
          type: number
          format: double
        currency:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderListResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderResponse"
        total:
          type: integer

    CheckoutRequest:
      type: object
      required: [paymentMethod]
      properties:
        addressId:
          type: string
          format: uuid
        paymentMethod:
          type: string
          enum: [Wallet, External]

    CheckoutResponse:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/OrderStatus"
        amount:
          type: number
          format: double
        currency:
          type: string
        requiresPayment:
          type: boolean

    PaymentStatus:
      type: string
      enum: [Pending, Succeeded, Failed, Refunded]

    PaymentRequest:
      type: object
      required: [orderId, method]
      properties:
        orderId:
          type: string
          format: uuid
        method:
          type: string
          enum: [Wallet, External]

    PaymentResponse:
      type: object
      properties:
        paymentId:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/PaymentStatus"
        amount:
          type: number
          format: double
        currency:
          type: string

    Wallet:
      type: object
      properties:
        balance:
          type: number
          format: double
        currency:
          type: string

    WalletTopupRequest:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
          minimum: 1
        currency:
          type: string
          minLength: 3
          maxLength: 3

    WalletWithdrawRequest:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
          minimum: 1
        currency:
          type: string
          minLength: 3
          maxLength: 3

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация нового пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Конфликт данных

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Неверные учетные данные

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Обновление токена
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Успешное обновление
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /users/me:
    get:
      tags: [Users]
      summary: Профиль текущего пользователя
      responses:
        "200":
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      tags: [Users]
      summary: Обновить профиль
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                  minLength: 3
                  maxLength: 50
      responses:
        "200":
          description: Профиль обновлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/roles/seller:
    post:
      tags: [Users]
      summary: Стать продавцом
      responses:
        "201":
          description: Роль продавца добавлена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/addresses:
    get:
      tags: [Users]
      summary: Список адресов
      responses:
        "200":
          description: Адреса пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Address"
    post:
      tags: [Users]
      summary: Добавить адрес
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAddressRequest"
      responses:
        "201":
          description: Адрес создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"

  /users/me/addresses/{addressId}:
    patch:
      tags: [Users]
      summary: Обновить адрес
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAddressRequest"
      responses:
        "200":
          description: Адрес обновлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
    delete:
      tags: [Users]
      summary: Удалить адрес
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Адрес удален

  /products:
    get:
      tags: [Products]
      summary: Список товаров
      security: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Список товаров
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      tags: [Products]
      summary: Создать товар
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Товар создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{productId}:
    get:
      tags: [Products]
      summary: Детали товара
      security: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Детали товара
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      tags: [Products]
      summary: Обновить товар
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Товар обновлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      tags: [Products]
      summary: Снять товар с продажи
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Товар снят с продажи

  /products/{productId}/stock:
    patch:
      tags: [Products]
      summary: Обновить остатки
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStockRequest"
      responses:
        "200":
          description: Остатки обновлены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /categories:
    get:
      tags: [Categories]
      summary: Список категорий
      security: []
      responses:
        "200":
          description: Категории
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      tags: [Categories]
      summary: Создать категорию
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
      responses:
        "201":
          description: Категория создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /cart:
    get:
      tags: [Cart]
      summary: Текущая корзина
      responses:
        "200":
          description: Корзина
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"

  /cart/items:
    post:
      tags: [Cart]
      summary: Добавить товар в корзину
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCartItemRequest"
      responses:
        "200":
          description: Корзина обновлена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"

  /cart/items/{itemId}:
    patch:
      tags: [Cart]
      summary: Изменить количество
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemRequest"
      responses:
        "200":
          description: Корзина обновлена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
    delete:
      tags: [Cart]
      summary: Удалить позицию
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Позиция удалена

  /cart/checkout:
    post:
      tags: [Orders]
      summary: Оформить заказ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "201":
          description: Заказ создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"

  /orders:
    get:
      tags: [Orders]
      summary: Список заказов
      responses:
        "200":
          description: Список заказов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /orders/{orderId}:
    get:
      tags: [Orders]
      summary: Детали заказа
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Детали заказа
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"

  /orders/{orderId}/status:
    get:
      tags: [Orders]
      summary: Статус заказа
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Статус заказа
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    $ref: "#/components/schemas/OrderStatus"

  /orders/{orderId}/cancel:
    post:
      tags: [Orders]
      summary: Отменить заказ
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Заказ отменен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"

  /orders/{orderId}/shipments:
    get:
      tags: [Orders]
      summary: Отправки по заказу
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Отправки по заказу
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    shipmentId:
                      type: string
                      format: uuid
                    status:
                      type: string
                    trackingNumber:
                      type: string

  /payments:
    post:
      tags: [Payments]
      summary: Оплатить заказ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
      responses:
        "200":
          description: Платеж создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"

  /payments/{paymentId}:
    get:
      tags: [Payments]
      summary: Детали платежа
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Детали платежа
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"

  /payments/{paymentId}/refund:
    post:
      tags: [Payments]
      summary: Возврат платежа
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Возврат выполнен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"

  /wallet:
    get:
      tags: [Wallet]
      summary: Баланс кошелька
      responses:
        "200":
          description: Баланс
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/topup:
    post:
      tags: [Wallet]
      summary: Пополнить кошелек
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletTopupRequest"
      responses:
        "200":
          description: Кошелек пополнен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/withdraw:
    post:
      tags: [Wallet]
      summary: Вывести средства
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletWithdrawRequest"
      responses:
        "200":
          description: Средства выведены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
