services:
  api-gateway:
    build: ./src/ApiGateway
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - user-service
      - listing-service
      - order-service
      - payment-service

  user-service:
    build: ./src/Services/UserService/UserService.API
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development

  listing-service:
    build: ./src/Services/ListingService/ListingService.API
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development

  order-service:
    build: ./src/Services/OrderService/OrderService.API
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development

  payment-service:
    build: ./src/Services/PaymentService/PaymentService.API
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development

