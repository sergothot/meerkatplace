services:
  api-gateway:
    build:
      context: ./src
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - user-service
      - listing-service
      - order-service
      - payment-service

  user-service:
    build:
      context: ./src
      dockerfile: Services/UserService/UserService.API/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development

  listing-service:
    build:
      context: ./src
      dockerfile: Services/ListingService/ListingService.API/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development

  order-service:
    build:
      context: ./src
      dockerfile: Services/OrderService/OrderService.API/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development

  payment-service:
    build:
      context: ./src
      dockerfile: Services/PaymentService/PaymentService.API/Dockerfile
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development

