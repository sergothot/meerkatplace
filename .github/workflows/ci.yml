name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  dotnet-build:
    name: .NET Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore meerkatplace.slnx

      - name: Build
        run: dotnet build meerkatplace.slnx --configuration Release --no-restore

      - name: Start dependencies for integration tests
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          endpoints=(
            "http://localhost:8080/health"
            "http://localhost:5001/health"
            "http://localhost:5002/health"
            "http://localhost:5003/health"
            "http://localhost:5004/health"
          )

          for endpoint in "${endpoints[@]}"; do
            echo "Checking $endpoint"
            for attempt in {1..90}; do
              if curl --fail --silent --show-error "$endpoint" > /dev/null; then
                echo "Healthy: $endpoint"
                break
              fi

              if [[ "$attempt" -eq 90 ]]; then
                echo "Timed out waiting for $endpoint"
                docker compose ps
                exit 1
              fi

              sleep 2
            done
          done

      - name: Test
        run: dotnet test meerkatplace.slnx --configuration Release --no-build --verbosity normal

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v --remove-orphans

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: dotnet-build

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            dockerfile: src/ApiGateway/Dockerfile
          - service: user-service
            dockerfile: src/Services/UserService/UserService.API/Dockerfile
          - service: listing-service
            dockerfile: src/Services/ListingService/ListingService.API/Dockerfile
          - service: order-service
            dockerfile: src/Services/OrderService/OrderService.API/Dockerfile
          - service: payment-service
            dockerfile: src/Services/PaymentService/PaymentService.API/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ${{ matrix.dockerfile }}
          push: false
          tags: meerkatplace/${{ matrix.service }}:ci
