services:
  api-gateway:
    image: ghcr.io/${GHCR_OWNER}/meerkatplace-api-gateway:${IMAGE_TAG:-latest}
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Cors__AllowedOrigins__0=${CORS_ORIGIN}
      - Features__EnableSwagger=true
    restart: unless-stopped
    depends_on:
      - user-service
      - listing-service
      - order-service
      - payment-service

  user-service:
    image: ghcr.io/${GHCR_OWNER}/meerkatplace-user-service:${IMAGE_TAG:-latest}
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=user-db;Port=5432;Database=userservice;Username=postgres;Password=postgres
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Features__EnableSwagger=true
      - Swagger__Endpoint=/swagger/user/v1/swagger.json
    restart: unless-stopped
    depends_on:
      user-db:
        condition: service_healthy

  listing-service:
    image: ghcr.io/${GHCR_OWNER}/meerkatplace-listing-service:${IMAGE_TAG:-latest}
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=listing-db;Port=5432;Database=listingservice;Username=postgres;Password=postgres
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Features__EnableSwagger=true
      - Swagger__Endpoint=/swagger/listing/v1/swagger.json
    restart: unless-stopped
    depends_on:
      listing-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  order-service:
    image: ghcr.io/${GHCR_OWNER}/meerkatplace-order-service:${IMAGE_TAG:-latest}
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=order-db;Port=5432;Database=orderservice;Username=postgres;Password=postgres
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - ListingService__BaseUrl=http://listing-service:8080
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Features__EnableSwagger=true
      - Swagger__Endpoint=/swagger/order/v1/swagger.json
    restart: unless-stopped
    depends_on:
      order-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  payment-service:
    image: ghcr.io/${GHCR_OWNER}/meerkatplace-payment-service:${IMAGE_TAG:-latest}
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=payment-db;Port=5432;Database=paymentservice;Username=postgres;Password=postgres
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Features__EnableSwagger=true
      - Swagger__Endpoint=/swagger/payment/v1/swagger.json
    restart: unless-stopped
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped

  caddy:
    image: caddy:2
    environment:
      - CADDY_SITE_ADDRESS=${CADDY_SITE_ADDRESS}
      - CADDY_EMAIL=${CADDY_EMAIL}
    profiles:
      - edge
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api-gateway
    restart: unless-stopped

  user-db:
    image: postgres:17
    environment:
      POSTGRES_DB: userservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: unless-stopped
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  listing-db:
    image: postgres:17
    environment:
      POSTGRES_DB: listingservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: unless-stopped
    volumes:
      - listing-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:17
    environment:
      POSTGRES_DB: orderservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: unless-stopped
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:17
    environment:
      POSTGRES_DB: paymentservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: unless-stopped
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  caddy-data:
  caddy-config:
  user-db-data:
  listing-db-data:
  order-db-data:
  payment-db-data:
